services:
  db:
    image: mysql:8.0
    container_name: pokedex_db
    restart: always
    environment:
      MYSQL_DATABASE: pokedex_DB
      MYSQL_USER: pokedex_user
      MYSQL_PASSWORD: pokedex_password
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  web:
    build: .
    container_name: pokedex_web
    restart: always
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DEBUG: "True"
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: pokedex_DB
      DB_USER: pokedex_user
      DB_PASSWORD: pokedex_password

volumes:
  db_data: