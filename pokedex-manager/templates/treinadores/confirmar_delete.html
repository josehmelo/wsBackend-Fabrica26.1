{% extends 'base.html' %}
{% block title %}Deletar Treinador{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Deletar Treinador</h1>
</div>

<div class="delete-card">
  <div class="alert alert-error">Atenção: esta ação não pode ser desfeita!</div>
  <p>Você está prestes a deletar o treinador <strong style="color:#fff;">{{ treinador.nome }}</strong> e todos os pokémons da sua party.</p>
  <form method="POST">
    {% csrf_token %}
    <div class="form-acoes">
      <button type="submit" class="btn btn-danger">Confirmar exclusão</button>
      <a href="/treinadores/" class="btn btn-outline">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
