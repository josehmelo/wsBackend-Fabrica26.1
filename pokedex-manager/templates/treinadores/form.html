{% extends 'base.html' %}
{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="page-header">
  <h1>{{ titulo }}</h1>
</div>

<div class="form-card">
  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="form-acoes">
      <button type="submit" class="btn btn-success">Salvar</button>
      <a href="/treinadores/" class="btn btn-outline">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
